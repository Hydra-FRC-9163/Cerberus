<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>HYDRA Limelight Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="data:,">

  <!-- CSS -->
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/cameras/cameras_box.css" />
  <link rel="stylesheet" href="./css/cameras/arrow+bbox.css" />
</head>

<body>
  <div id="dashboard-root">
    <div class="limelight-grid">

      <!-- ========================= -->
      <!-- LINHA 1 — LIME 4 (SÓ STREAM / SEM IA) -->
      <!-- ========================= -->
      <div class="limelight-row" id="lime4">

        <div class="camera-box arrow-parent">
          <img
            id="cam-lime4"
            src=""
            alt="Lime 4 Stream"
            style="width:100%; height:100%; object-fit:cover;"
          >
        </div>

        <div class="info-box">
          <div class="info-title">Lime 4</div>

          <div class="offset-container" id="yaw-lime4">
            <div class="offset-line">
              <div class="offset-box"></div>
              <span class="offset-label">Trava de Mira:</span>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">TAG</span>
            </div>
          </div>

          <div class="info-footer">
            <span id="temp-lime4" class="ll-temp">Temp: --°C</span>
          </div>

        </div>
      </div>

      <!-- ========================= -->
      <!-- LINHA 2 — LIME 2+ (SÓ STREAM / SEM IA) -->
      <!-- ========================= -->
      <div class="limelight-row" id="lime2plus">

        <div class="camera-box arrow-parent">
          <img
            id="cam-lime2plus"
            src=""
            alt="Lime 2+ Stream"
            style="width:100%; height:100%; object-fit:cover;"
          >
        </div>

        <div class="info-box">
          <div class="info-title">Lime 2+</div>

          <div class="offset-container" id="yaw-lime2plus">
            <div class="offset-line">
              <div class="offset-box"></div>
              <span class="offset-label">Trava de Mira:</span>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">TAG</span>
            </div>
          </div>

          <div class="offset-container" id="shooter-lime2plus">
            <div class="offset-line">
              <div class="offset-box"></div>
              <span class="offset-label">Shooter:</span>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">AUTO</span>
            </div>
          </div>

          <div class="info-footer">
            <span id="temp-lime2plus" class="ll-temp">Temp: --°C</span>
          </div>

        </div>
      </div>

      <!-- ========================= -->
      <!-- LINHA 3 — FISHEYE (COM IA: SETA + BBOX) -->
      <!-- ========================= -->
      <div class="limelight-row" id="lime2">

        <div class="camera-box arrow-parent">
          <img
            id="cam-fisheye"
            src=""
            alt="Fisheye Stream"
            style="width:100%; height:100%; object-fit:cover; transform: rotate(180deg);"
          >
          <div class="arrow hidden" id="arrow-lime2"></div>
        </div>

        <div class="info-box">
          <div class="info-title">Fisheye</div>

          <div class="offset-container" id="yaw-lime2">
            <div class="offset-line">
              <div class="offset-box"></div>
              <span class="offset-label">Trava de Mira:</span>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">ON</span>
            </div>
          </div>

          <div class="offset-container" id="align-piece">
            <div class="offset-line">
              <div class="offset-box"></div>
              <span class="offset-label">Intake:</span>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">ON</span>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script type="module" src="./js/ws.js"></script>
  <script type="module" src="./js/cameras/arrow_nt.js"></script>
  <script type="module" src="./js/cameras/modes.js"></script>

  <script>
    fetch('./config/dashboard.json')
      .then(response => response.json())
      .then(config => {
        if (!config.cameras) {
          console.error("Configuração de câmeras não encontrada.");
          return;
        }

        document.getElementById("cam-lime4").src =
          config.cameras.lime4;

        document.getElementById("cam-lime2plus").src =
          config.cameras.lime2plus;

        document.getElementById("cam-fisheye").src =
          config.cameras.fisheye;
      })
      .catch(error => {
        console.error("Erro ao carregar dashboard.json:", error);
      });
  </script>

</body>
</html>
